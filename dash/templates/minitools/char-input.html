{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT 1: Character Input</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>
<body>

    <h1>Character Input</h1>

    <!-- <form action="/arcade-tracker" method="post">  -->
    <!-- <form action="{% url 'submit_data'%}" method="post">  -->
    <form action="" method="post"> 
        <!-- to protect post form and verify the request for django  -->
        {% csrf_token %}

    <!-- using post method - onsubmit we will send user input data to py-program file-->
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="user_name" required><br><br>

        <label for="user_age">Your Age:</label>
        <input type="number" id="user_age" name="user_age" required><br><br>


        <input type="submit" value="Submit">
    </form>

        <!-- The Output appears here after submission -->
    {% if output_year %}
        <span style="margin-top: 10px; color: yellow; font-family: Arial, sans-serif;">
            <p> Hi {{ user_name }} , <br>
                You will be turning 100 years old in year {{ output_year }}</p>
        </span>
    {% endif %}
</body>
</html>
