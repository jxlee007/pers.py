{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MT 1: Character Input</title>

    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>
  <body>
    <a href="/mini-tools">&larr; Back to Mini Tools</a>

    <table border="1">
      <tr>
        <td>
          <h3>
            <h1>Character Input</h1>
          </h3>
        </td>
        <td rowspan="2">
          <!-- The Output appears here after submission -->
          {% if result_output %}
          <div style="color: yellow; font-family: Arial, sans-serif">
            <p style="font-size: 16px; font-weight: bold">Output:</p>
            <pre> {{ result_output }} </pre>
          </div>
          {% endif %}
        </td>
      </tr>
      <tr>
        <td>
          <!-- <form action="/arcade-tracker" method="post">  -->
          <!-- <form action="{% url 'submit_data'%}" method="post">  -->
          <form action="" method="post">
            <!-- to protect post form and verify the request for django  -->
            {% csrf_token %}

            <!-- using post method - onsubmit we will send user input data to py-program file-->
            <label for="name">Your Name:</label>
            <input
              type="text"
              id="name"
              name="user_name"
              required
            /><br /><br />

            <label for="user_age">Your Age:</label>
            <input
              type="number"
              id="user_age"
              name="user_age"
              required
            /><br /><br />

            <label for="number">Enter a number (1-10):</label>
            <input
              type="number"
              id="number"
              name="number"
              min="1"
              max="10"
            /><br /><br />

            <input type="submit" value="Submit" />
          </form>
        </td>
      </tr>
    </table>
  </body>
</html>
